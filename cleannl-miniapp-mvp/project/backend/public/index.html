<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Clean NL</title>
<link rel="stylesheet" href="style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div id="splash" class="splash">
  <img id="splashLogo" class="splash-logo hidden" alt="Clean NL logo">
  <p class="splash-brand">Clean Netherlands</p>
  <p class="splash-welcome">Welkom</p>
</div>

<header class="topbar">
  <div class="brand-row">
    <img id="logoImg" class="brand-logo hidden" alt="Clean NL logo">
    <h1>Clean NL</h1>
  </div>
  <div class="category-filter" id="categoryFilter"></div>
</header>

<main id="productGrid" class="product-grid">
  <div class="loading">Producten laden...</div>
</main>

<div id="productModal" class="modal hidden">
  <div class="modal-content">
    <button class="close-btn" id="closeModal">&times;</button>
    <div id="modalMedia" class="modal-media"></div>
    <h2 id="modalName"></h2>
    <p id="modalDescription" class="modal-description"></p>
    <div id="modalQuantities" class="quantity-list"></div>
    <button id="contactBtn" class="contact-btn">Neem contact op</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
